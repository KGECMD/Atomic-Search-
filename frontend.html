<!DOCTYPE html>
<html>
<head>
<title>WeRender Search</title>
<style>
body{font-family:Arial;background:#1f1f1f;color:white;margin:0;padding:0;text-align:center;}
header{padding:20px;}
input{width:400px;padding:10px;font-size:16px;border-radius:20px;border:none;}
button{padding:10px 16px;margin-left:10px;border-radius:6px;border:none;background:#4a90e2;color:white;cursor:pointer;}
.result{max-width:700px;margin:20px auto;text-align:left;border-bottom:1px solid #444;padding:10px;}
.result a{color:#4a90e2;font-size:18px;text-decoration:none;}
.url{color:#7ed957;font-size:12px;}
#ai{background:#333;margin:20px auto;padding:10px;border-radius:6px;max-width:700px;}
#stats{margin-top:10px;font-size:14px;color:#aaa;}
</style>
</head>
<body>
<header>
<h1>WeRender Search</h1>
<input id="q" placeholder="Search the web"><button onclick="search()">Search</button>
<div style="margin-top:10px;">
<input id="site" placeholder="Submit a website"><button onclick="submitSite()">Submit</button>
</div>
<div id="stats"></div>
</header>

<div id="ai"></div>
<div id="results"></div>

<script>
async function search(){
  let q=document.getElementById("q").value;
  let data=await fetch("/search?q="+encodeURIComponent(q)).then(r=>r.json());
  let r=document.getElementById("results");
  r.innerHTML="";
  data.forEach(p=>{
    let div=document.createElement("div");
    div.className="result";
    div.innerHTML=`<div class="url">${p.url}</div><a href="${p.url}" target="_blank">${p.title}</a><p>${p.text.slice(0,200)}</p>`;
    r.appendChild(div);
  });
  aiAnswer(q);
}

async function aiAnswer(q){
  let res=await fetch("/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({q})});
  let data=await res.json();
  document.getElementById("ai").innerHTML="<h3>AI Answer</h3><pre>"+data.answer+"</pre>";
}

async function submitSite(){
  let url=document.getElementById("site").value;
  await fetch("/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url})});
  alert("Site submitted");
}

// distributed crawl worker
async function crawlWorker(){
  let task=await fetch("/crawl-task").then(r=>r.json());
  if(!task.url) return;
  try{
    let html = await fetch(task.url).then(r=>r.text());
    let links=[...html.matchAll(/href="(http[^"]+)"/g)].map(x=>x[1]);
    await fetch("/crawl-result",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:task.url,title:task.url,text:html.slice(0,1000),links})});
  }catch(e){}
}
setInterval(crawlWorker,15000);

// live stats
async function loadStats(){
  let s=await fetch("/stats").then(r=>r.json());
  document.getElementById("stats").innerText="Indexed pages: "+s.pages+" | Queue: "+s.queue;
}
setInterval(loadStats,5000);
loadStats();
</script>
</body>
</html>
